[Service]
# No GPU devices - CPU-only mode
# All Ollama GPU-related settings will be ignored

# Conservative parallelism for CPU-only systems
# Environment=OLLAMA_NUM_PARALLEL=4
# Environment=OLLAMA_MAX_LOADED_MODELS=1
