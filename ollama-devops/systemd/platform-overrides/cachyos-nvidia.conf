#============================================================================
# Title:            cachyos-nvidia.conf
# Description:      systemd drop-in for NVIDIA GPU-enabled Linux (CachyOS)
#                   Enables direct GPU device access for Ollama
# Author:           Keverall
# Date:             2026-04-30
# Version:          1.0.0
#============================================================================

[Service]
# GPU device permissions for NVIDIA RTX 4090
DeviceAllow=/dev/nvidia0 rw
DeviceAllow=/dev/nvidiactl rw
DeviceAllow=/dev/nvidia-uvm rw
DeviceAllow=/dev/nvidia-uvm-tools rw

# Platform-specific environment overrides (can also be in /etc/default/ollama)
# These supplement or override the main service file settings
# Environment=OLLAMA_NUM_PARALLEL=24
# Environment=OLLAMA_MAX_LOADED_MODELS=2
# Environment=OLLAMA_GPU_LAYERS=50
